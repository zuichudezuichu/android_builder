name: android_build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 查看代码
        uses: actions/checkout@v4

      # 1. 安装 Python 3.8 环境
      - name: 安装 Python 3.8 环境
        run: |
          sudo apt update
          sudo apt install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt update
          sudo apt install -y python3.8 python3.8-dev python3.8-distutils python3-pip
          sudo ln -sf /usr/bin/python3.8 /usr/bin/python
          sudo ln -sf /usr/bin/pip3 /usr/bin/pip
          pip install --upgrade pip setuptools wheel
          python --version

      # 2. 配置 JDK 11 环境
      - name: 配置 JDK 11
        run: |
          sudo update-alternatives --set java /usr/lib/jvm/temurin-11-jdk-amd64/bin/java
          sudo update-alternatives --set javac /usr/lib/jvm/temurin-11-jdk-amd64/bin/javac
          echo "JAVA_HOME=/usr/lib/jvm/temurin-11-jdk-amd64" >> $GITHUB_ENV
          echo "GRADLE_OPTS=-Xmx4g -Dorg.gradle.daemon=false" >> $GITHUB_ENV

      # 3. 配置 Android SDK
      - name: 配置 Android SDK
        run: |
          ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          sdkmanager --no_https "platforms;android-33" "build-tools;33.0.2" "build-tools;30.0.3" || true

      # 4. 克隆项目
      - id: get-project
        name: 克隆项目
        run: |
          PROJECT_URL=$(cat project-to-build | tr -d ' \n\r')
          rm -rf 项目
          git clone --depth=1 $PROJECT_URL 项目
          echo "✅ 项目克隆完成"

      # 5. 全局替换 Windows Python 路径
      - name: 全局替换 Python 路径
        working-directory: ./项目
        run: |
          find . -type f \( -name "build.gradle" -o -name "build.gradle.kts" -o -name "gradle.properties" \) | \
            xargs sed -i 's#D:/Programs/Python/Python38/python.exe#/usr/bin/python#g'
          
          cat > local.properties << EOF
          sdk.dir=${{ env.ANDROID_SDK_ROOT }}
          chaquopy.python.buildPython=/usr/bin/python
          chaquopy.python.version=3.8
          org.gradle.java.home=/usr/lib/jvm/temurin-11-jdk-amd64
          pyramid.chaquopy.python.buildPython=/usr/bin/python
          EOF

      # 6. 构建 APK
      - name: 构建应用（normalDebug 变体）
        working-directory: ./项目
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 7.5 --distribution-type bin
          fi
          chmod +x gradlew
          
          # 执行构建
          ./gradlew assembleNormalDebug --no-daemon --stacktrace --max-workers 1
          
          # ========== 核心修复：优化 APK 查找逻辑 ==========
          echo "📝 列出项目中所有文件（用于排查 APK 路径）："
          find . -type f | grep -E "\.apk$" | tee /tmp/apk_list.txt
          
          # 规则1：匹配所有 debug APK（不限制命名）
          APK_FILES=$(find . -name "*.apk" -type f | grep -i debug)
          
          # 规则2：如果没找到，扩大匹配范围（所有 APK）
          if [ -z "$APK_FILES" ]; then
            APK_FILES=$(find . -name "*.apk" -type f)
          fi
          
          # 验证并输出结果
          if [ -n "$APK_FILES" ]; then
            echo -e "\n✅ 构建成功！找到以下 APK 文件："
            ls -lh $APK_FILES
            # 将 APK 路径写入环境变量，方便后续上传
            echo "APK_PATHS=$APK_FILES" >> $GITHUB_ENV
          else
            echo -e "\n❌ 未找到 APK 文件，打印构建输出目录："
            ls -lh ./app/build/outputs/
            exit 1
          fi

      # 7. 上传 APK
      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: android-normal-debug-apk
          path: ${{ env.APK_PATHS }}
          retention-days: 14
