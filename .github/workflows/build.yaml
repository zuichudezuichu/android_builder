name: android_build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 查看代码
        uses: actions/checkout@v4

      # 手动配置 JDK 8 环境（完全绕开 setup-java 的缓存扫描）
      - name: 手动配置 JDK 8 环境
        run: |
          # 安装 JDK 8（GitHub Ubuntu 环境预装了 temurin-8）
          sudo update-alternatives --set java /usr/lib/jvm/temurin-8-jdk-amd64/bin/java
          sudo update-alternatives --set javac /usr/lib/jvm/temurin-8-jdk-amd64/bin/javac
          # 配置环境变量
          echo "JAVA_HOME=/usr/lib/jvm/temurin-8-jdk-amd64" >> $GITHUB_ENV
          echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV
          # 禁用 Gradle 守护进程（核心：避免 --add-opens 参数）
          echo "GRADLE_OPTS=-Xmx2048m -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2048m" >> $GITHUB_ENV
          # 验证 JDK 版本
          java -version
          javac -version

      # 手动配置 Android SDK 环境
      - name: 配置 Android SDK 环境
        run: |
          ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH" >> $GITHUB_ENV
          
          # 手动接受 Android SDK 许可
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
          
          echo "✅ Android SDK 路径配置完成：$ANDROID_SDK_ROOT"

      # 读取项目地址（增强容错）
      - id: get-project
        name: 获取项目名称
        run: |
          if [ ! -f "project-to-build" ]; then
            echo "❌ 错误：仓库根目录未找到 project-to-build 文件！"
            echo "👉 请创建该文件，内容为 Android 项目的 Git 地址（如 https://github.com/xxx/xxx.git）"
            exit 1
          fi
          # 去除文件中的空格、换行符，避免地址错误
          PROJECT_NAME=$(cat project-to-build | tr -d ' \n\r')
          if [ -z "$PROJECT_NAME" ]; then
            echo "❌ 错误：project-to-build 文件内容为空！"
            exit 1
          fi
          echo "PROJECT=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "✅ 已读取项目地址：$PROJECT_NAME"

      # 克隆项目
      - name: 克隆项目
        run: |
          # 克隆前先清空旧目录（避免重复克隆冲突）
          rm -rf 项目
          git clone --depth=1 ${{ steps.get-project.outputs.PROJECT }} 项目
          if [ ! -d "项目" ]; then
            echo "❌ 错误：克隆失败，请检查 Git 地址是否有效！"
            exit 1
          fi
          echo "✅ 项目克隆成功，目录：$(pwd)/项目"

      # 生成 local.properties（指向正确的 SDK 路径）
      - name: 生成 local.properties
        working-directory: ./项目
        run: |
          echo "sdk.dir=${{ env.ANDROID_HOME }}" > local.properties
          # 验证文件内容
          echo "✅ local.properties 生成完成，内容："
          cat local.properties

      # 安装项目所需的 Android SDK 组件（按需修改版本）
      - name: 安装 Android SDK 组件
        run: |
          # 安装常用版本（根据项目 build.gradle 中的 compileSdkVersion 调整）
          sdkmanager --no_https "platforms;android-33" "build-tools;33.0.2" || true
          echo "✅ SDK 组件安装完成"

      # 构建应用程序（核心：强制使用兼容 JDK 8 的 Gradle 版本）
      - name: 构建应用程序
        working-directory: ./项目
        run: |
          # 关键：初始化 Gradle Wrapper 为兼容 JDK 8 的版本（6.9.4 是最后支持 JDK 8 的稳定版）
          if [ ! -f "gradlew" ]; then
            echo "🔧 初始化兼容 JDK 8 的 Gradle Wrapper（6.9.4）..."
            gradle wrapper --gradle-version 6.9.4 --distribution-type bin
          fi
          # 添加执行权限
          chmod +x gradlew
          # 执行构建（禁用守护进程 + 移除不兼容的 JVM 参数）
          ./gradlew assembleDebug --stacktrace --no-daemon --no-jvm-opts --max-workers 2
          
          # 检查 APK 文件是否生成
          APK_FILES=$(find . -name '*.apk' -type f)
          if [ -z "$APK_FILES" ]; then
            echo "❌ 构建失败：未找到 APK 文件！"
            exit 1
          else
            echo "✅ 构建成功！生成的 APK 文件："
            ls -l $APK_FILES
          fi

      # 上传 APK 产物
      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: my-build-apk
          path: ./项目/**/*.apk
          retention-days: 7
          if-no-files-found: error
